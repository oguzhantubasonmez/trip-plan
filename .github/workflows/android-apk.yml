# Ubuntu’da Expo prebuild + Gradle — EAS Build kotası kullanmaz.
# Çıktı: release APK (JS paketi gömülü; telefonda Metro gerekmez).
# Expo prebuild şablonunda release, debug keystore ile imzalanır — yalnızca dahili test içindir; mağaza için kendi keystore’un gerekir.
#
# Gerekli GitHub Secrets (Repository → Settings → Secrets and variables → Actions):
#   EXPO_PUBLIC_FIREBASE_API_KEY
#   EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
#   EXPO_PUBLIC_FIREBASE_PROJECT_ID
#   EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
#   EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
#   EXPO_PUBLIC_FIREBASE_APP_ID
#   EXPO_PUBLIC_GOOGLE_MAPS_API_KEY
#
# Gerçek AdMob reklamları (isteğe bağlı; yoksa uygulama Google TestIds kullanır):
#   EXPO_PUBLIC_ADMOB_BANNER_UNIT_ID
#   EXPO_PUBLIC_ADMOB_REWARDED_UNIT_ID
#
# İmzalı release APK için: android/app/build.gradle içinde signingConfig + repoda
# ANDROID_KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD secrets; sonra
# ./gradlew assembleRelease kullanılır (bu workflow’u ona göre genişletmen gerekir).

name: Android APK (prebuild + Gradle)

on:
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Write .env for build
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
          EXPO_PUBLIC_ADMOB_BANNER_UNIT_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_BANNER_UNIT_ID }}
          EXPO_PUBLIC_ADMOB_REWARDED_UNIT_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_REWARDED_UNIT_ID }}
        run: |
          set -e
          missing() { echo "Missing Actions secret: $1 — Repo → Settings → Secrets and variables → Actions"; exit 1; }
          [ -n "$EXPO_PUBLIC_FIREBASE_API_KEY" ] || missing EXPO_PUBLIC_FIREBASE_API_KEY
          [ -n "$EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN" ] || missing EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
          [ -n "$EXPO_PUBLIC_FIREBASE_PROJECT_ID" ] || missing EXPO_PUBLIC_FIREBASE_PROJECT_ID
          [ -n "$EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET" ] || missing EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
          [ -n "$EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID" ] || missing EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          [ -n "$EXPO_PUBLIC_FIREBASE_APP_ID" ] || missing EXPO_PUBLIC_FIREBASE_APP_ID
          [ -n "$EXPO_PUBLIC_GOOGLE_MAPS_API_KEY" ] || missing EXPO_PUBLIC_GOOGLE_MAPS_API_KEY
          {
            echo "EXPO_PUBLIC_FIREBASE_API_KEY=\"$EXPO_PUBLIC_FIREBASE_API_KEY\""
            echo "EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=\"$EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN\""
            echo "EXPO_PUBLIC_FIREBASE_PROJECT_ID=\"$EXPO_PUBLIC_FIREBASE_PROJECT_ID\""
            echo "EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=\"$EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET\""
            echo "EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=\"$EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID\""
            echo "EXPO_PUBLIC_FIREBASE_APP_ID=\"$EXPO_PUBLIC_FIREBASE_APP_ID\""
            echo "EXPO_PUBLIC_GOOGLE_MAPS_API_KEY=\"$EXPO_PUBLIC_GOOGLE_MAPS_API_KEY\""
            [ -n "$EXPO_PUBLIC_ADMOB_BANNER_UNIT_ID" ] && echo "EXPO_PUBLIC_ADMOB_BANNER_UNIT_ID=\"$EXPO_PUBLIC_ADMOB_BANNER_UNIT_ID\""
            [ -n "$EXPO_PUBLIC_ADMOB_REWARDED_UNIT_ID" ] && echo "EXPO_PUBLIC_ADMOB_REWARDED_UNIT_ID=\"$EXPO_PUBLIC_ADMOB_REWARDED_UNIT_ID\""
          } > .env

      - name: Expo prebuild (Android)
        env:
          CI: '1'
        run: npx expo prebuild --platform android --no-install

      # assembleDebug JS’i APK’ya koymaz → cihazda "Unable to load script" hatası.
      # assembleRelease: expo export:embed ile bundle + Hermes; prebuild şablonu release’i debug keystore ile imzalar.
      - name: Gradle assembleRelease
        working-directory: mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: routewise-android-release
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
